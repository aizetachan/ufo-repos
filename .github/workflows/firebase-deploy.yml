name: Desplegar a Firebase Hosting

# NOTA: disparadores de push/PR desactivados hasta que exista el secreto
# FIREBASE_SERVICE_ACCOUNT en el repo (ver README). Mientras tanto, solo
# ejecución manual. Para reactivar el despliegue automático, restaurar:
#   push: { branches: [main] }  y  pull_request:
on:
  workflow_dispatch:

jobs:
  # Despliegue a producción: cada push a main publica el sitio
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sitio estático puro: no hay build. Se despliega el repo tal cual
      # según los ignores de firebase.json.
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: expediente-umbra
          channelId: live

  # Previews: cada pull request obtiene una URL temporal propia
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: expediente-umbra
