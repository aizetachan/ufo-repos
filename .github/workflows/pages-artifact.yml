name: Pages por artefacto (plan B)

# Vía alternativa de despliegue: sube el sitio como artefacto y lo publica
# con actions/deploy-pages, sin pasar por el build interno de la rama
# gh-pages. Requiere que el origen de Pages sea "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # Solo se publica el sitio: fuera ficheros internos del repo
      - name: Preparar sitio
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'README.md' \
            --exclude 'firebase.json' \
            --exclude '.firebaserc' \
            ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
