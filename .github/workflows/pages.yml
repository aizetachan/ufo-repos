name: Desplegar a GitHub Pages

# Estrategia: publicar el sitio en la rama gh-pages (GitHub la sirve
# automáticamente). El intento con actions/deploy-pages falló porque el
# GITHUB_TOKEN no puede CREAR el sitio de Pages en repos personales.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,firebase.json,.firebaserc,README.md'
