name: Desplegar a GitHub Pages

# MECANISMO ANTIGUO (rama gh-pages), conservado solo como respaldo manual.
# El despliegue normal lo hace pages-artifact.yml (origen: GitHub Actions).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,firebase.json,.firebaserc,README.md'
